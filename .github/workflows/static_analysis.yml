name: rpi Static Analysis

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  # ── 커널 드라이버 정적분석 (cppcheck) ──
  driver-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: Install Static Analysis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: cppcheck (driver + shared)
        run: bash tools/run_static_analysis.sh

  # TODO(daemon): 데몬 코드 추가되면 daemon-analysis 잡 추가
  #   cmake 빌드 + cppcheck(--error-exitcode) + clang-tidy
